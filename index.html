<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>茶叶评价</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}
body{background:#f5f5f5;padding:20px;}
.box{max-width:500px;margin:0 auto;background:#fff;border-radius:12px;padding:25px;box-shadow:0 2px 10px #ddd;}
.img{width:100%;border-radius:8px;margin:15px 0;}
.title{font-size:20px;color:#333;}
.desc{color:#666;margin:10px 0 20px;}
.star{font-size:30px;color:#ccc;cursor:pointer;margin:15px 0;}
.star.active{color:#ffb400;}
textarea{width:100%;height:100px;padding:10px;border:1px solid #eee;border-radius:6px;resize:none;}
.btn{margin-top:15px;padding:10px 25px;border:none;border-radius:6px;background:#28a745;color:#fff;cursor:pointer;}
</style>
</head>
<body>
<div class="box">
    <h2 class="title">优质高山茶叶</h2>
    <p class="desc">口感醇厚回甘，天然原生态茶饮</p>
    <img class="img" src="https://picsum.photos/id/122/500/300">

    <div class="star" id="starBox">
        <span onclick="setStar(1)">☆</span>
        <span onclick="setStar(2)">☆</span>
        <span onclick="setStar(3)">☆</span>
        <span onclick="setStar(4)">☆</span>
        <span onclick="setStar(5)">☆</span>
    </div>

    <textarea id="txt" placeholder="写下你的使用评价..."></textarea>
    <button class="btn" onclick="submit()">提交评价</button>
</div>

<script>
let score=0;
function setStar(n){
    score=n;
    let arr=document.querySelectorAll("#starBox span");
    arr.forEach((s,i)=>{
        s.className=i<n?"active":"";
    })
}
async function submit(){
    let val=txt.value.trim();
    if(!score)return alert("请选择星级评分");
    if(!val)return alert("请填写评价内容");
    await fetch("/api/comments",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({star:score,content:val,time:new Date().toLocaleString()})
    })
    alert("提交成功");
    txt.value="";score=0;setStar(0);
}
</script>
</body>
</html>
