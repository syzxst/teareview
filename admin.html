<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>评价管理后台</title>
<style>
body{padding:30px;max-width:600px;margin:0 auto;}
.item{border:1px solid #eee;padding:15px;margin:10px 0;border-radius:8px;}
h3{margin-bottom:20px;}
</style>
</head>
<body>
<h3>所有用户评价汇总</h3>
<div id="commentsList">加载中...</div>

<script>
async function loadComments(){
    let res=await fetch("/api/comments");
    let data=await res.json();
    let html="";
    if(data.length===0){
        html="<p>暂无提交评价</p>";
    }else{
        data.forEach(c=>{
            html += `<div class="item">
                <p>星级：${c.star}星</p>
                <p>评价：${c.content}</p>
                <p>时间：${c.time}</p>
            </div>`;
        });
    }
    document.getElementById("commentsList").innerHTML=html;
}
loadComments();
</script>
</body>
</html>
